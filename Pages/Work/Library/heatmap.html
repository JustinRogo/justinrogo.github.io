<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Occupancy Heatmap | Dashboard</title>
    <style>
        :root {
            /* Modern Dark Palette */
            --bg-body: #0f172a;       /* Slate 900 */
            --bg-panel: rgba(30, 41, 59, 0.85); /* Slate 800 with alpha */
            --bg-element: #334155;    /* Slate 700 */
            --primary: #3b82f6;       /* Blue 500 */
            --primary-hover: #2563eb; /* Blue 600 */
            --danger: #ef4444;        /* Red 500 */
            --text-main: #f1f5f9;     /* Slate 100 */
            --text-muted: #94a3b8;    /* Slate 400 */
            --border: #1e293b;        /* Slate 800 */
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent body scroll, handle inside wrap */
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 20;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 0; /* allows flex children to shrink */
        }

        .logo-area {
            font-weight: 700;
            font-size: 1.1rem;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
        }
        
        .stat-badge {
            background: var(--bg-element);
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.9rem;
            color: var(--text-main);
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        /* --- Scrollable Tabs --- */
        .tabs-container {
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE */
            mask-image: linear-gradient(to right, transparent, black 10px, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10px, black 90%, transparent);
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tabs {
            display: flex;
            gap: 0.5rem;
            padding: 0 10px;
        }

        .tab {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
        }

        .tab.active {
            background: var(--bg-element);
            color: var(--primary);
            border-color: var(--border);
            box-shadow: var(--shadow);
        }

        .tab .badge {
            background: rgba(0,0,0,0.3);
            font-size: 0.75rem;
            padding: 0.1rem 0.4rem;
            border-radius: 99px;
            color: var(--text-muted);
        }
        .tab.active .badge {
            background: var(--primary);
            color: white;
        }

        /* --- Main Canvas Area --- */
        #wrap {
            position: relative;
            flex: 1;
            background-image: radial-gradient(var(--bg-element) 1px, transparent 1px);
            background-size: 20px 20px; /* Grid pattern effect */
            overflow: hidden;
            touch-action: none;
            cursor: crosshair;
        }

        #floor, #heat {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: block;
        }
        #heat { pointer-events: none; }

        /* --- Footer / Controls --- */
        footer {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 0.75rem 1rem;
            display: grid;
            grid-template-columns: auto 1fr auto; /* Tools | Notes | Submit */
            gap: 1rem;
            align-items: center;
            z-index: 20;
        }

        .toolbar-group {
            display: flex;
            gap: 0.5rem;
        }

        /* Buttons */
        button {
            border: 1px solid var(--border);
            background: var(--bg-element);
            color: var(--text-main);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover:not(:disabled) {
            background: #475569;
        }
        button:active:not(:disabled) {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.icon-only {
            padding: 0.6rem;
            font-size: 1.2rem;
            line-height: 1;
        }

        /* Submit Button Special Styling */
        .submitbtn {
            background: var(--primary);
            border-color: var(--primary-hover);
            color: white;
            font-weight: 600;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        .submitbtn:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        /* Textarea styling */
        .notes-wrap {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
        }
        
        #notes {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            padding: 0.6rem;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            width: 100%;
            height: 42px; /* Compact by default */
            transition: height 0.2s, border-color 0.2s;
        }
        #notes:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0,0,0,0.3);
            height: 80px; /* Expands on focus */
            position: absolute;
            bottom: 0;
            z-index: 30;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }

        /* --- Settings Panel --- */
        .panel {
            position: fixed;
            top: 70px;
            right: 1rem;
            width: 300px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            z-index: 50;
            transform-origin: top right;
            transition: transform 0.2s, opacity 0.2s;
            max-height: calc(100dvh - 90px);
            overflow-y: auto;
        }

        .panel input[type="datetime-local"],
        .panel input[type="time"] {
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: white;
            padding: 4px;
            border-radius: 4px;
            width: 100%;
            font-family: inherit;
        }

        .dow-filter { display: flex; gap: 4px; }
        .dow-filter button { flex: 1; padding: 0.4rem 0; font-size: 0.8rem; }
        .dow-filter button.on {
            background: var(--primary);
            border-color: var(--primary-hover);
            color: #fff;
        }
        
        .panel[hidden] {
            display: flex !important; /* Override default hidden display */
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .panel h3 {
            margin: 0 0 0.5rem 0;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .control-row {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .control-row label {
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
        }
        
        /* Custom Range Inputs */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: var(--bg-element);
            border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--primary);
            margin-top: -5px;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        
        /* File Inputs */
        input[type="file"] {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        input[type="file"]::file-selector-button {
            border: 1px solid var(--border);
            background: var(--bg-element);
            color: var(--text-main);
            border-radius: 4px;
            padding: 0.2rem 0.5rem;
            margin-right: 0.5rem;
            cursor: pointer;
        }

        /* --- Playback Bar --- */
        #playbackBar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 1rem;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            z-index: 15;
            flex-wrap: wrap;
        }
        #playbackBar[hidden] { display: none; }
        #pbSlider { flex: 1; min-width: 120px; }
        #pbLabel {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        #playbackBar button { padding: 0.35rem 0.6rem; font-size: 0.9rem; }
        #pbAll.active-mode { color: var(--primary); border-color: var(--primary); }

        /* --- Analytics Overlay --- */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--bg-body);
            display: flex;
            flex-direction: column;
        }
        .overlay[hidden] { display: none; }
        .overlay-head {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
        }
        .overlay-head h2 { margin: 0; font-size: 1.1rem; flex: 1; white-space: nowrap; }
        .an-muted { color: var(--text-muted); font-size: 0.85rem; }
        .overlay-body { flex: 1; overflow-y: auto; padding: 1rem; }
        #anContent { display: grid; gap: 1rem; }
        #anContent[hidden] { display: none; }
        .an-empty { color: var(--text-muted); text-align: center; padding: 3rem 1rem; }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
        }
        .stat-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
        }
        .stat-card .k { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .stat-card .v { font-size: 1.5rem; font-weight: 700; margin-top: 0.15rem; }
        .stat-card .s { font-size: 0.75rem; color: var(--text-muted); }

        .chart-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
        }
        .chart-card h3 {
            margin: 0 0 0.75rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }
        #anLine { display: block; }
        .legend { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 0.6rem; font-size: 0.8rem; color: var(--text-muted); }
        .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: -1px; }

        .dow-grid-wrap { overflow-x: auto; }
        .dow-grid {
            display: grid;
            grid-template-columns: 38px repeat(24, minmax(16px, 1fr));
            gap: 2px;
            min-width: 540px;
        }
        .dow-cell { aspect-ratio: 1; border-radius: 3px; background: rgba(255, 255, 255, 0.04); }
        .dow-lbl {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floor-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; font-size: 0.85rem; }
        .floor-row:last-child { margin-bottom: 0; }
        .floor-row .fl-name { width: 64px; color: var(--text-muted); flex-shrink: 0; }
        .floor-row .fl-bar-wrap { flex: 1; background: rgba(255, 255, 255, 0.05); border-radius: 99px; height: 14px; overflow: hidden; }
        .floor-row .fl-bar { height: 100%; border-radius: 99px; }
        .floor-row .fl-val { width: 120px; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }

        /* --- Mobile Tweaks --- */
        @media (max-width: 768px) {

            footer {
                grid-template-columns: 1fr 1fr; /* Two columns */
                grid-template-areas: 
                    "tools submit"
                    "notes notes";
            }
            .toolbar-group { grid-area: tools; }
            .submitbtn { grid-area: submit; width: 100%; }
            .notes-wrap { grid-area: notes; margin-top: 0.5rem; }
            
            #notes:focus {
                position: static; /* Don't pop up on mobile, keeps flow */
                height: 60px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-left">
            <button id="menuBtn" type="button" class="icon-only" aria-label="Menu" aria-expanded="false" aria-controls="controlsPanel">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            
            <div class="tabs-container">
                <div class="tabs" id="tabs"></div>
            </div>
        </div>

        <div class="stat-badge">
            Total: <strong id="totalCount" style="color: var(--primary); margin-left:4px;">0</strong>
        </div>
    </header>

    <div id="wrap">
        <canvas id="floor"></canvas>
        <canvas id="heat"></canvas>
    </div>

    <div id="playbackBar" hidden>
        <button id="pbPrev" class="icon-only" title="Previous session">⏮</button>
        <button id="pbPlay" class="icon-only" title="Play through sessions">▶</button>
        <button id="pbNext" class="icon-only" title="Next session">⏭</button>
        <input id="pbSlider" type="range" min="0" max="0" value="0" aria-label="Session scrubber">
        <span id="pbLabel"></span>
        <button id="pbAll" class="active-mode" title="Show all sessions aggregated">Σ All</button>
    </div>

    <footer>
        <div class="toolbar-group">
            <button id="undo" disabled title="Undo last point">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                Undo
            </button>
            <button id="clear" disabled title="Clear points on this floor">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Clear
            </button>
        </div>

        <div class="notes-wrap">
            <textarea id="notes" placeholder="Add optional notes here..."></textarea>
        </div>

        <button id="submit" class="submitbtn">
            Submit
            <span id="status" style="font-weight: 400; font-size: 0.8em; opacity: 0.8;"></span>
        </button>
    </footer>

    <div id="controlsPanel" class="panel" hidden>
        <div class="control-row">
            <button id="analyticsBtn" type="button" hidden style="width:100%; border-color:var(--primary); color:var(--primary);">📊 Open Trend Analytics</button>
        </div>

        <h3>Visualization</h3>
        <div class="control-row">
            <label>Radius <span id="val-radius">50</span></label>
            <input id="radius" type="range" min="8" max="80" value="50" oninput="document.getElementById('val-radius').innerText=this.value">
        </div>
        <div class="control-row">
            <label>Intensity <span id="val-inten">150</span></label>
            <input id="intensity" type="range" min="5" max="200" value="150" oninput="document.getElementById('val-inten').innerText=this.value">
        </div>
        <div class="control-row">
            <label>Opacity <span id="val-opac">80%</span></label>
            <input id="opacity" type="range" min="10" max="100" value="80" oninput="document.getElementById('val-opac').innerText=this.value+'%'">
        </div>
        <div class="control-row">
            <label>Blur <span id="val-blur">8px</span></label>
            <input id="blur" type="range" min="0" max="30" value="8" oninput="document.getElementById('val-blur').innerText=this.value+'px'">
        </div>

        <h3>Data Management</h3>
        <div class="control-row">
            <button id="resetAll" style="width:100%; border-color:var(--danger); color:var(--danger);">Reset All Floors</button>
        </div>
        
        <h3>Load History</h3>
        <div class="control-row">
            <button id="loadFolder" style="width:100%;">📂 Load OneDrive folder…</button>
            <button id="rescanFolder" style="width:100%;" hidden>🔄 Rescan “<span id="folderName"></span>”</button>
            <button id="clearSessions" style="width:100%;" hidden>Clear loaded sessions</button>
            <div id="loadStatus" style="font-size:0.8rem; color:var(--text-muted);"></div>
            <input id="loadFolderFallback" type="file" webkitdirectory multiple hidden>
        </div>
        <div class="control-row">
            <label>Single JSON</label>
            <input id="loadJSON" type="file" accept="application/json">
        </div>
        <div class="control-row">
            <label>Multiple JSONs</label>
            <input id="loadMany" type="file" accept="application/json" multiple>
        </div>
        
        <h3>Filters</h3>
        <div class="control-row">
            <label>Date Start</label>
            <input id="from" type="datetime-local">
        </div>
        <div class="control-row">
            <label>Date End</label>
            <input id="to" type="datetime-local">
        </div>
        <div class="control-row">
            <label>Time of Day (start – end)</label>
            <div style="display:flex; gap:0.5rem;">
                <input id="todFrom" type="time" aria-label="Time of day start">
                <input id="todTo" type="time" aria-label="Time of day end">
            </div>
        </div>
        <div class="control-row">
            <label>Days of Week <span style="text-transform:none;">(none = all)</span></label>
            <div class="dow-filter" id="dowFilter">
                <button type="button" data-dow="0">Su</button>
                <button type="button" data-dow="1">Mo</button>
                <button type="button" data-dow="2">Tu</button>
                <button type="button" data-dow="3">We</button>
                <button type="button" data-dow="4">Th</button>
                <button type="button" data-dow="5">Fr</button>
                <button type="button" data-dow="6">Sa</button>
            </div>
        </div>
        <div class="control-row">
            <button id="clearFilters" style="width:100%;">Clear filters</button>
        </div>
        <div class="control-row" style="flex-direction:row; align-items:center;">
             <input id="includeSessions" type="checkbox" checked style="width:auto;">
             <label for="includeSessions" style="margin-left:0.5rem; margin-bottom:0;">Include loaded sessions</label>
        </div>
    </div>

    <div id="analyticsOverlay" class="overlay" hidden>
        <div class="overlay-head">
            <h2>📊 Trend Analysis</h2>
            <span id="anRange" class="an-muted"></span>
            <button id="anExport" title="Export session totals as CSV">⬇ CSV</button>
            <button id="anClose" class="icon-only" aria-label="Close analytics">✕</button>
        </div>
        <div class="overlay-body">
            <div id="anEmpty" class="an-empty" hidden>No sessions in the selected date range.</div>
            <div id="anContent" hidden>
                <div class="stat-cards" id="anStats"></div>
                <div class="chart-card">
                    <h3>Patron count per session</h3>
                    <canvas id="anLine"></canvas>
                    <div id="anLegend" class="legend"></div>
                </div>
                <div class="chart-card">
                    <h3>Average count by day &amp; hour</h3>
                    <div id="anGrid" class="dow-grid-wrap"></div>
                </div>
                <div class="chart-card">
                    <h3>Points by floor</h3>
                    <div id="anFloors"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            // --- Embedded floor images (replace placeholders) ------------------------
            const EMBEDDED = {
                '1F': 'https://raw.githubusercontent.com/JustinRogo/justinrogo.github.io/refs/heads/main/Maps/1F.png',
                '2F': 'https://raw.githubusercontent.com/JustinRogo/justinrogo.github.io/refs/heads/main/Maps/2F.png',
                '3F': 'https://raw.githubusercontent.com/JustinRogo/justinrogo.github.io/refs/heads/main/Maps/3F.png',
                '4F': 'https://raw.githubusercontent.com/JustinRogo/justinrogo.github.io/refs/heads/main/Maps/4F.png',
                '5F': 'https://raw.githubusercontent.com/JustinRogo/justinrogo.github.io/refs/heads/main/Maps/5F.png',
            };

            // --- Floors ---------------------------------------------------------------
            const FLOORS = [
                { id: '1F', label: '1st Floor', img: new Image(), imgSrc: null, points: [] },
                { id: '2F', label: '2nd Floor', img: new Image(), imgSrc: null, points: [] },
                { id: '3F', label: '3rd Floor', img: new Image(), imgSrc: null, points: [] },
                { id: '4F', label: '4th Floor', img: new Image(), imgSrc: null, points: [] },
                { id: '5F', label: '5th Floor', img: new Image(), imgSrc: null, points: [] },
            ];
            let current = 0;

            // Sessions loaded for trend review
            const SESSIONS = []; 

            // --- Elements -------------------------------------------------------------
            const wrap = document.getElementById('wrap');
            const floor = document.getElementById('floor');
            const heat = document.getElementById('heat');
            const fctx = floor.getContext('2d');
            const hctx = heat.getContext('2d');
            const undoBtn = document.getElementById('undo');
            const clearBtn = document.getElementById('clear');
            const resetAll = document.getElementById('resetAll');
            const submitBtn = document.getElementById('submit');
            const statusEl = document.getElementById('status');
            const radiusEl = document.getElementById('radius');
            const intenEl = document.getElementById('intensity');
            const opacEl = document.getElementById('opacity');
            const blurEl = document.getElementById('blur');
            const loadJSON = document.getElementById('loadJSON');
            const loadMany = document.getElementById('loadMany');
            const fromEl = document.getElementById('from');
            const toEl = document.getElementById('to');
            const includeSessionsEl = document.getElementById('includeSessions');
            const notesEl = document.getElementById('notes');
            const FLOW_URL = "https://default17f1a87e2a254eaab9df9d439034b0.80.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8a4d2abd61de4fceb5cb6d2a4b2b31a8/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=EhX0b_ECMsXs08oSiwPJKO3H5KMRI3O0l3V1lLtdM6Q";

            // Tabs with counters
            const tabs = document.getElementById('tabs');
            FLOORS.forEach((fl, i) => {
                const b = document.createElement('button');
                b.className = 'tab' + (i === 0 ? ' active' : '');
                // Using div to allow flex styling
                b.innerHTML = `<span>${fl.label}</span> <span class="badge" id="count-${fl.id}">0</span>`;
                b.onclick = () => { current = i; updateTabs(); fitCanvas(); redraw(); };
                tabs.appendChild(b);
            });
            function updateTabs() {
                tabs.querySelectorAll('.tab').forEach((el, idx) => {
                    el.classList.toggle('active', idx === current);
                    // scroll into view if needed
                    if (idx === current) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                });
            }

            // Preload embedded images
            FLOORS.forEach(fl => {
                if (EMBEDDED[fl.id]) {
                    fl.imgSrc = EMBEDDED[fl.id];
                    fl.img.src = EMBEDDED[fl.id];
                }
                fl.img.onload = () => { if (FLOORS[current] === fl) { fitCanvas(); redraw(); } persist(); };
            });

            // Resize handling
            window.addEventListener('resize', () => { fitCanvas(); redraw(); });

            // Input: only inside fitted image rect
            wrap.addEventListener('pointerdown', e => {
                const fl = FLOORS[current];
                if (!fl.img.naturalWidth) return;
                const rect = floor.getBoundingClientRect();
                const px = e.clientX - rect.left, py = e.clientY - rect.top;

                const fit = imageFitRect(fl.img.naturalWidth, fl.img.naturalHeight, floor.width, floor.height);
                if (px < fit.x || px > fit.x + fit.w || py < fit.y || py > fit.y + fit.h) return;

                const x = (px - fit.x) * (fl.img.naturalWidth / fit.w);
                const y = (py - fit.y) * (fl.img.naturalHeight / fit.h);

                fl.points.push({ x, y, t: Date.now() });
                persist(); redraw();
            });

            undoBtn.onclick = () => { FLOORS[current].points.pop(); persist(); redraw(); };
            clearBtn.onclick = () => { FLOORS[current].points = []; persist(); redraw(); };

            resetAll.onclick = () => {
                if(confirm("Are you sure you want to clear all data from ALL floors?")) {
                    FLOORS.forEach(fl => fl.points = []);
                    persist(); redraw();
                }
            };

            async function sendToFlow(payload) {
                const r = await fetch(FLOW_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if (!r.ok) throw new Error(`${r.status} ${await r.text().catch(() => "")}`);
                return r; 
            }

            submitBtn.onclick = async () => {
                const payload = {
                    submitted_at: new Date().toISOString(),
                    note: (notesEl?.value || "").trim(),
                    floors: FLOORS.map(fl => ({
                        id: fl.id,
                        image_data_url: fl.img.naturalWidth ? fl.img.src : null,
                        image_size: fl.img.naturalWidth ? { w: fl.img.naturalWidth, h: fl.img.naturalHeight } : null,
                        points: fl.points
                    })),
                    TotalCount: computeTotalCount()
                };

                const originalText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                statusEl.textContent = " (Sending...)";
                
                try {
                    await sendToFlow(payload);
                    statusEl.textContent = " (Done!)";
                    
                    // Visual feedback success
                    submitBtn.style.background = "#10b981"; // Green
                    setTimeout(() => {
                        submitBtn.style.background = ""; // Reset
                        statusEl.textContent = "";
                        submitBtn.disabled = false;
                    }, 2000);

                    // reset points only
                    FLOORS.forEach(fl => fl.points = []);
                    persist(); redraw();

                    // clear note
                    if (notesEl) notesEl.value = "";
                } catch (e) {
                    statusEl.textContent = " Error";
                    alert(`Flow error: ${e.message}`);
                    submitBtn.disabled = false;
                }
            };

            // Load a single JSON
            loadJSON.onchange = e => {
                const [f] = e.target.files || [];
                if (!f) return;
                f.text().then(txt => {
                    try {
                        const data = JSON.parse(txt);
                        if (!data.floors) throw new Error("Bad format");
                        data.floors.forEach((fl, i) => {
                            if (!FLOORS[i]) return;
                            FLOORS[i].points = Array.isArray(fl.points) ? fl.points : [];
                            if (fl.image_data_url) { FLOORS[i].imgSrc = fl.image_data_url; FLOORS[i].img.src = fl.image_data_url; }
                        });
                        current = 0; updateTabs(); fitCanvas(); redraw();
                        alert(`Loaded ${f.name}`);
                    } catch (err) { alert("Invalid JSON file"); console.error(err); }
                });
            };

            // Load many JSONs (manual multi-select)
            loadMany.onchange = e => {
                const files = Array.from(e.target.files || []);
                if (files.length) loadFiles(files);
                e.target.value = '';
            };
            
            // Listeners for sliders that trigger redraw
            [radiusEl, intenEl, opacEl, blurEl].forEach(el => el.addEventListener('input', redraw));
            [fromEl, toEl, includeSessionsEl].forEach(el => el.addEventListener('input', redraw));

            // --- Helpers --------------------------------------------------------------
            function computeTotalCount() {
                let total = 0;
                FLOORS.forEach(fl => {
                    let n = fl.points.length;
                    for (const sess of filteredSessions()) {
                        const sf = (sess.floors || []).find(f => f.id === fl.id);
                        if (sf && Array.isArray(sf.points)) n += sf.points.length;
                    }
                    total += n;
                });
                return total;
            }

            function fitCanvas() {
                const rect = wrap.getBoundingClientRect();
                floor.width = Math.max(1, Math.floor(rect.width));
                floor.height = Math.max(1, Math.floor(rect.height));
                heat.width = floor.width; heat.height = floor.height;
                fctx.imageSmoothingEnabled = true;
                fctx.imageSmoothingQuality = 'high';
            }

            function imageFitRect(iw, ih, cw, ch) {
                if (!iw || !ih || !cw || !ch) return { x: 0, y: 0, w: cw, h: ch };
                const s = Math.min(cw / iw, ch / ih);
                const w = Math.floor(iw * s), h = Math.floor(ih * s);
                const x = Math.floor((cw - w) / 2), y = Math.floor((ch - h) / 2);
                return { x, y, w, h };
            }

            function filteredSessions() {
                if (playback.active) {
                    const list = analyticsSessions();
                    return list.length ? [list[Math.min(playback.index, list.length - 1)]] : [];
                }
                if (!includeSessionsEl.checked) return [];
                return analyticsSessions();
            }

            // Sessions matching all active filters (date range, time of day,
            // days of week), sorted by time (ignores the include-sessions
            // toggle — used by analytics, playback and CSV export)
            function analyticsSessions() {
                const start = fromEl.value ? new Date(fromEl.value) : new Date(-8640000000000000);
                const end = toEl.value ? new Date(toEl.value) : new Date(8640000000000000);
                const days = activeDows();
                const toMins = v => { const [h, m] = v.split(':').map(Number); return h * 60 + m; };
                const lo = todFromEl.value ? toMins(todFromEl.value) : null;
                const hi = todToEl.value ? toMins(todToEl.value) : null;
                return SESSIONS.filter(s => {
                    if (s.ts < start || s.ts > end) return false;
                    if (days.size && !days.has(s.ts.getDay())) return false;
                    if (lo !== null || hi !== null) {
                        const mins = s.ts.getHours() * 60 + s.ts.getMinutes();
                        const a = lo ?? 0, b = hi ?? 1439;
                        // a > b means the window wraps past midnight (e.g. 10 PM – 2 AM)
                        const inWindow = a <= b ? (mins >= a && mins <= b) : (mins >= a || mins <= b);
                        if (!inWindow) return false;
                    }
                    return true;
                }).sort((a, b) => a.ts - b.ts);
            }

            function redraw() {
                const fl = FLOORS[current];

                const aggPoints = [...fl.points];
                for (const sess of filteredSessions()) {
                    const sf = (sess.floors || []).find(f => f.id === fl.id);
                    if (sf && Array.isArray(sf.points)) aggPoints.push(...sf.points);
                }

                undoBtn.disabled = fl.points.length === 0;
                clearBtn.disabled = fl.points.length === 0;

                fctx.clearRect(0, 0, floor.width, floor.height);
                hctx.clearRect(0, 0, heat.width, heat.height);

                if (!fl.img.naturalWidth) { updateCounts(); return; }

                const fit = imageFitRect(fl.img.naturalWidth, fl.img.naturalHeight, floor.width, floor.height);
                fctx.drawImage(fl.img, 0, 0, fl.img.naturalWidth, fl.img.naturalHeight, fit.x, fit.y, fit.w, fit.h);

                const down = 0.5;
                const hw = Math.max(1, (fit.w * down) | 0);
                const hh = Math.max(1, (fit.h * down) | 0);
                const acc = document.createElement('canvas'); acc.width = hw; acc.height = hh;
                const actx = acc.getContext('2d', { willReadFrequently: true });
                actx.clearRect(0, 0, hw, hh);
                actx.globalCompositeOperation = 'lighter';

                const R = +radiusEl.value, I = +intenEl.value, k = down;

                const spr = makeKernelSprite(R);
                const sR = Math.max(2, Math.round(R * k));
                const sprScaled = document.createElement('canvas');
                sprScaled.width = sR * 2; sprScaled.height = sR * 2;
                sprScaled.getContext('2d').drawImage(spr, 0, 0, sprScaled.width, sprScaled.height);

                const iw = fl.img.naturalWidth, ih = fl.img.naturalHeight;
                const sx = fit.w / iw, sy = fit.h / ih;

                for (const p of aggPoints) {
                    const x = p.x * sx * k;
                    const y = p.y * sy * k;
                    actx.globalAlpha = Math.min(1, I / 100);
                    actx.drawImage(sprScaled, x - sR, y - sR);
                }

                const imgData = actx.getImageData(0, 0, hw, hh);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const a = data[i + 3] / 255;
                    const [r, g, b] = ramp(a);
                    data[i] = r; data[i + 1] = g; data[i + 2] = b;
                    data[i + 3] = Math.round(255 * (+opacEl.value / 100) * Math.min(1, a * 1.5));
                }
                actx.putImageData(imgData, 0, 0);

                const blurPx = +blurEl.value;
                if (blurPx > 0) {
                    const tmp = document.createElement('canvas'); tmp.width = hw; tmp.height = hh;
                    const bctx = tmp.getContext('2d'); bctx.filter = `blur(${blurPx}px)`; bctx.drawImage(acc, 0, 0);
                    actx.clearRect(0, 0, hw, hh); actx.drawImage(tmp, 0, 0);
                }

                hctx.drawImage(acc, 0, 0, hw, hh, fit.x, fit.y, fit.w, fit.h);

                // QA markers - improved visibility
                fctx.fillStyle = '#0f172a'; // dark center
                fctx.strokeStyle = '#3b82f6'; // blue ring
                fctx.lineWidth = 1.5;
                for (const p of aggPoints) {
                    const mx = fit.x + p.x * sx;
                    const my = fit.y + p.y * sy;
                    fctx.beginPath(); fctx.arc(mx, my, 3, 0, Math.PI * 2); fctx.fill(); fctx.stroke();
                }

                updateCounts();
            }

            function makeKernelSprite(R) {
                const c = document.createElement('canvas'); c.width = c.height = R * 2;
                const ctx = c.getContext('2d');
                const g = ctx.createRadialGradient(R, R, 0, R, R, R);
                g.addColorStop(0, 'rgba(0,0,0,1)');
                g.addColorStop(0.3, 'rgba(0,0,0,0.35)');
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(R, R, R, 0, Math.PI * 2); ctx.fill();
                return c;
            }

            function ramp(t) {
                let x = Math.max(0, Math.min(1, t));
                x = Math.pow(x, 1);
                const G = [0, 255, 0];
                const Y = [255, 255, 0];
                const O = [255, 165, 0];
                const R = [255, 0, 0];

                const lerp = (a, b, p) => Math.round(a + (b - a) * p);
                let c;
                if (x < 0.5) {
                    const p = x / 0.5; 
                    c = [lerp(G[0], Y[0], p), lerp(G[1], Y[1], p), lerp(G[2], Y[2], p)];
                } else if (x < 0.75) {
                    const p = (x - 0.5) / 0.25;
                    c = [lerp(Y[0], O[0], p), lerp(Y[1], O[1], p), lerp(Y[2], O[2], p)];
                } else {
                    const p = (x - 0.75) / 0.25;
                    c = [lerp(O[0], R[0], p), lerp(O[1], R[1], p), lerp(O[2], R[2], p)];
                }
                return c;
            }

            function updateCounts() {
                let total = 0;
                FLOORS.forEach(fl => {
                    let n = fl.points.length;
                    for (const sess of filteredSessions()) {
                        const sf = (sess.floors || []).find(f => f.id === fl.id);
                        if (sf && Array.isArray(sf.points)) n += sf.points.length;
                    }
                    total += n;
                    const el = document.getElementById(`count-${fl.id}`);
                    if (el) el.textContent = n;
                });
                const t = document.getElementById('totalCount');
                if (t) t.textContent = total;
            }

            function persist() {
                const minimal = FLOORS.map(fl => ({ id: fl.id, points: fl.points }));
                localStorage.setItem('multi-floor-heatmap-embedded', JSON.stringify(minimal));
            }
            function restore() {
                try {
                    const arr = JSON.parse(localStorage.getItem('multi-floor-heatmap-embedded') || "[]");
                    arr.forEach((o, i) => { if (FLOORS[i]) FLOORS[i].points = o.points || []; });
                } catch { }
            }

            function toLocalDT(d) {
                const pad = n => String(n).padStart(2, '0');
                return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
            }

            // =================================================================
            // Session store, folder loading & trend analysis
            // =================================================================
            const FLOOR_COLORS = { '1F': '#60a5fa', '2F': '#34d399', '3F': '#fbbf24', '4F': '#f87171', '5F': '#c084fc' };
            const sessionKeys = new Set();
            let folderHandle = null;

            const loadFolderBtn = document.getElementById('loadFolder');
            const rescanBtn = document.getElementById('rescanFolder');
            const folderNameEl = document.getElementById('folderName');
            const folderFallback = document.getElementById('loadFolderFallback');
            const loadStatusEl = document.getElementById('loadStatus');
            const clearSessionsBtn = document.getElementById('clearSessions');
            const analyticsBtn = document.getElementById('analyticsBtn');
            const overlay = document.getElementById('analyticsOverlay');
            const todFromEl = document.getElementById('todFrom');
            const todToEl = document.getElementById('todTo');
            const dowFilterEl = document.getElementById('dowFilter');
            const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            const fmtDT = ts => ts.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
            const fmtD = ts => ts.toLocaleDateString([], { month: 'short', day: 'numeric' });
            const fmtTod = v => new Date('1970-01-01T' + v).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

            function activeDows() {
                return new Set([...dowFilterEl.querySelectorAll('button.on')].map(b => +b.dataset.dow));
            }

            function addSession(json, fallbackKey) {
                if (!json || !Array.isArray(json.floors)) return false;
                const key = json.submitted_at || fallbackKey;
                if (!key || sessionKeys.has(key)) return false;
                sessionKeys.add(key);
                const ts = json.submitted_at ? new Date(json.submitted_at) : new Date();
                if (isNaN(+ts)) return false;
                SESSIONS.push({ ts, floors: json.floors, note: json.note || '' });
                return true;
            }

            function sessionTotals(s) {
                const per = {}; let total = 0;
                FLOORS.forEach(fl => {
                    const sf = (s.floors || []).find(f => f.id === fl.id);
                    const n = sf && Array.isArray(sf.points) ? sf.points.length : 0;
                    per[fl.id] = n; total += n;
                });
                return { per, total };
            }

            function afterSessionsChanged() {
                SESSIONS.sort((a, b) => a.ts - b.ts);
                if (SESSIONS.length && (!fromEl.value || !toEl.value)) {
                    fromEl.value = toLocalDT(SESSIONS[0].ts);
                    // pad the end by a minute so the newest session isn't cut off by truncated seconds
                    toEl.value = toLocalDT(new Date(+SESSIONS[SESSIONS.length - 1].ts + 60000));
                }
                analyticsBtn.hidden = SESSIONS.length === 0;
                clearSessionsBtn.hidden = SESSIONS.length === 0;
                updatePlaybackUI();
                fitCanvas();
                redraw();
                if (!overlay.hidden) renderAnalytics();
            }

            async function loadFiles(files) {
                let added = 0, failed = 0;
                for (const f of files) {
                    try {
                        const j = JSON.parse(await f.text());
                        if (addSession(j, f.name)) added++;
                    } catch { failed++; }
                }
                loadStatusEl.textContent =
                    `${SESSIONS.length} session${SESSIONS.length === 1 ? '' : 's'} loaded` +
                    (added ? ` (+${added} new)` : ' (no new files)') +
                    (failed ? ` · ${failed} unreadable` : '');
                afterSessionsChanged();
            }

            // --- Folder access (File System Access API, synced OneDrive) ----
            function idb() {
                return new Promise((res, rej) => {
                    const r = indexedDB.open('heatmap-fs', 1);
                    r.onupgradeneeded = () => r.result.createObjectStore('handles');
                    r.onsuccess = () => res(r.result);
                    r.onerror = () => rej(r.error);
                });
            }
            async function saveHandle(h) {
                const db = await idb();
                const tx = db.transaction('handles', 'readwrite');
                tx.objectStore('handles').put(h, 'dir');
                return new Promise(r => { tx.oncomplete = r; tx.onerror = r; });
            }
            async function loadHandle() {
                try {
                    const db = await idb();
                    return await new Promise(r => {
                        const rq = db.transaction('handles').objectStore('handles').get('dir');
                        rq.onsuccess = () => r(rq.result || null);
                        rq.onerror = () => r(null);
                    });
                } catch { return null; }
            }

            async function scanFolder() {
                if (!folderHandle) return;
                let perm = await folderHandle.queryPermission({ mode: 'read' });
                if (perm !== 'granted') perm = await folderHandle.requestPermission({ mode: 'read' });
                if (perm !== 'granted') { loadStatusEl.textContent = 'Folder access denied.'; return; }
                loadStatusEl.textContent = 'Reading folder…';
                const files = [];
                for await (const entry of folderHandle.values()) {
                    if (entry.kind === 'file' && /\.json$/i.test(entry.name)) files.push(await entry.getFile());
                }
                await loadFiles(files);
            }

            loadFolderBtn.onclick = async () => {
                if (window.showDirectoryPicker) {
                    try {
                        folderHandle = await window.showDirectoryPicker({ mode: 'read' });
                    } catch { return; /* user cancelled */ }
                    saveHandle(folderHandle);
                    folderNameEl.textContent = folderHandle.name;
                    rescanBtn.hidden = false;
                    await scanFolder();
                } else {
                    folderFallback.click();
                }
            };
            rescanBtn.onclick = scanFolder;
            folderFallback.onchange = e => {
                const files = Array.from(e.target.files || []).filter(f => /\.json$/i.test(f.name));
                if (files.length) loadFiles(files);
                else loadStatusEl.textContent = 'No JSON files in that folder.';
                e.target.value = '';
            };

            // Restore a previously-picked folder (rescan still needs one click,
            // since re-granting read permission requires a user gesture)
            loadHandle().then(h => {
                if (h && window.showDirectoryPicker) {
                    folderHandle = h;
                    folderNameEl.textContent = h.name;
                    rescanBtn.hidden = false;
                }
            });

            clearSessionsBtn.onclick = () => {
                SESSIONS.length = 0;
                sessionKeys.clear();
                stopTimer();
                playback.active = false;
                playback.index = 0;
                loadStatusEl.textContent = '';
                afterSessionsChanged();
            };

            // --- Playback (scrub through sessions on the heatmap) ------------
            const playback = { active: false, index: 0, timer: null };
            const playbackBar = document.getElementById('playbackBar');
            const pbSlider = document.getElementById('pbSlider');
            const pbPlay = document.getElementById('pbPlay');
            const pbPrev = document.getElementById('pbPrev');
            const pbNext = document.getElementById('pbNext');
            const pbAll = document.getElementById('pbAll');
            const pbLabel = document.getElementById('pbLabel');

            function setPlayback(active, index) {
                const list = analyticsSessions();
                playback.active = active && list.length > 0;
                playback.index = Math.max(0, Math.min(index ?? playback.index, list.length - 1));
                if (!playback.active) stopTimer();
                updatePlaybackUI();
                redraw();
            }
            function startTimer() {
                const list = analyticsSessions();
                if (!list.length) return;
                if (!playback.active || playback.index >= list.length - 1) setPlayback(true, 0);
                playback.timer = setInterval(() => {
                    if (playback.index >= analyticsSessions().length - 1) { stopTimer(); updatePlaybackUI(); return; }
                    setPlayback(true, playback.index + 1);
                }, 900);
                pbPlay.textContent = '⏸';
                pbPlay.title = 'Pause';
            }
            function stopTimer() {
                clearInterval(playback.timer);
                playback.timer = null;
                pbPlay.textContent = '▶';
                pbPlay.title = 'Play through sessions';
            }
            function updatePlaybackUI() {
                const list = analyticsSessions();
                playbackBar.hidden = SESSIONS.length === 0;
                pbSlider.max = Math.max(0, list.length - 1);
                pbSlider.value = Math.min(playback.index, list.length - 1);
                pbSlider.disabled = !list.length;
                pbAll.classList.toggle('active-mode', !playback.active);
                if (playback.active && list.length) {
                    const s = list[Math.min(playback.index, list.length - 1)];
                    pbLabel.textContent = `${Math.min(playback.index, list.length - 1) + 1}/${list.length} · ${fmtDT(s.ts)} · ${sessionTotals(s).total} patrons`;
                    pbLabel.title = s.note || '';
                } else {
                    pbLabel.textContent = `All ${list.length} session${list.length === 1 ? '' : 's'} (aggregate)`;
                    pbLabel.title = '';
                }
            }
            pbSlider.oninput = e => { stopTimer(); setPlayback(true, +e.target.value); };
            pbPrev.onclick = () => { stopTimer(); setPlayback(true, playback.index - 1); };
            pbNext.onclick = () => { stopTimer(); setPlayback(true, playback.index + 1); };
            pbAll.onclick = () => { stopTimer(); setPlayback(false); };
            pbPlay.onclick = () => { playback.timer ? stopTimer() : startTimer(); };

            function onFilterChange() {
                playback.index = Math.max(0, Math.min(playback.index, analyticsSessions().length - 1));
                updatePlaybackUI();
                redraw();
                if (!overlay.hidden) renderAnalytics();
            }
            [fromEl, toEl, todFromEl, todToEl].forEach(el => el.addEventListener('input', onFilterChange));
            dowFilterEl.querySelectorAll('button').forEach(b => {
                b.addEventListener('click', () => { b.classList.toggle('on'); onFilterChange(); });
            });
            document.getElementById('clearFilters').onclick = () => {
                todFromEl.value = '';
                todToEl.value = '';
                dowFilterEl.querySelectorAll('button.on').forEach(b => b.classList.remove('on'));
                if (SESSIONS.length) {
                    fromEl.value = toLocalDT(SESSIONS[0].ts);
                    toEl.value = toLocalDT(new Date(+SESSIONS[SESSIONS.length - 1].ts + 60000));
                } else {
                    fromEl.value = '';
                    toEl.value = '';
                }
                onFilterChange();
            };

            // --- Analytics overlay -------------------------------------------
            analyticsBtn.onclick = () => {
                // close the settings menu underneath before opening the overlay
                document.getElementById('controlsPanel').setAttribute('hidden', '');
                document.getElementById('menuBtn').setAttribute('aria-expanded', 'false');
                overlay.hidden = false;
                renderAnalytics();
            };
            document.getElementById('anClose').onclick = () => { overlay.hidden = true; };
            document.getElementById('anExport').onclick = exportCSV;
            document.addEventListener('keydown', e => { if (e.key === 'Escape' && !overlay.hidden) overlay.hidden = true; });
            window.addEventListener('resize', () => { if (!overlay.hidden) renderAnalytics(); });

            function renderAnalytics() {
                const list = analyticsSessions();
                const empty = !list.length;
                document.getElementById('anEmpty').hidden = !empty;
                document.getElementById('anContent').hidden = empty;
                const rangeEl = document.getElementById('anRange');
                if (empty) { rangeEl.textContent = ''; return; }
                const totals = list.map(sessionTotals);
                const filterBits = [];
                if (todFromEl.value || todToEl.value) {
                    filterBits.push(`${fmtTod(todFromEl.value || '00:00')}–${fmtTod(todToEl.value || '23:59')}`);
                }
                const days = activeDows();
                if (days.size) filterBits.push([...days].sort((a, b) => a - b).map(d => DAY_NAMES[d]).join(', '));
                rangeEl.textContent = `${list.length} sessions · ${fmtDT(list[0].ts)} – ${fmtDT(list[list.length - 1].ts)}` +
                    (filterBits.length ? ` · ${filterBits.join(' · ')}` : '');
                renderStats(list, totals);
                renderLineChart(list, totals);
                renderDowGrid(list, totals);
                renderFloorBars(totals);
            }

            function renderStats(list, totals) {
                const grand = totals.reduce((a, t) => a + t.total, 0);
                let peakI = 0;
                totals.forEach((t, i) => { if (t.total > totals[peakI].total) peakI = i; });
                document.getElementById('anStats').innerHTML = `
                    <div class="stat-card"><div class="k">Sessions</div><div class="v">${list.length}</div></div>
                    <div class="stat-card"><div class="k">Total patrons counted</div><div class="v">${grand.toLocaleString()}</div></div>
                    <div class="stat-card"><div class="k">Avg per session</div><div class="v">${(grand / list.length).toFixed(1)}</div></div>
                    <div class="stat-card"><div class="k">Peak session</div><div class="v">${totals[peakI].total}</div><div class="s">${fmtDT(list[peakI].ts)}</div></div>`;
            }

            function renderLineChart(list, totals) {
                const canvas = document.getElementById('anLine');
                const dpr = window.devicePixelRatio || 1;
                const cssW = Math.max(280, canvas.parentElement.clientWidth - 32);
                const cssH = 240;
                canvas.style.width = cssW + 'px';
                canvas.style.height = cssH + 'px';
                canvas.width = cssW * dpr;
                canvas.height = cssH * dpr;
                const ctx = canvas.getContext('2d');
                ctx.scale(dpr, dpr);
                const W = cssW, H = cssH, L = 34, Rm = 12, T = 12, B = 26;

                const ymax = Math.max(5, Math.ceil(Math.max(...totals.map(t => t.total)) / 5) * 5);
                const t0 = +list[0].ts, t1 = +list[list.length - 1].ts;
                const x = t => t1 === t0 ? L + (W - L - Rm) / 2 : L + (t - t0) / (t1 - t0) * (W - L - Rm);
                const y = v => T + (1 - v / ymax) * (H - T - B);

                ctx.font = '11px sans-serif';
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.fillStyle = '#94a3b8';
                ctx.textAlign = 'right';
                for (let i = 0; i <= 4; i++) {
                    const v = ymax * i / 4, yy = y(v);
                    ctx.beginPath(); ctx.moveTo(L, yy); ctx.lineTo(W - Rm, yy); ctx.stroke();
                    ctx.fillText(Math.round(v), L - 6, yy + 4);
                }
                ctx.textAlign = 'center';
                const nTicks = Math.min(4, list.length);
                const multiDay = (t1 - t0) > 3 * 864e5;
                for (let i = 0; i < nTicks; i++) {
                    const tt = t0 + (t1 - t0) * (nTicks === 1 ? 0.5 : i / (nTicks - 1));
                    ctx.fillText(multiDay ? fmtD(new Date(tt)) : fmtDT(new Date(tt)), x(tt), H - 8);
                }

                FLOORS.forEach(fl => {
                    ctx.strokeStyle = FLOOR_COLORS[fl.id];
                    ctx.lineWidth = 1.2;
                    ctx.globalAlpha = 0.65;
                    ctx.beginPath();
                    list.forEach((s, i) => {
                        const px = x(+s.ts), py = y(totals[i].per[fl.id]);
                        i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
                    });
                    ctx.stroke();
                });
                ctx.globalAlpha = 1;
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                list.forEach((s, i) => {
                    const px = x(+s.ts), py = y(totals[i].total);
                    i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
                });
                ctx.stroke();
                ctx.fillStyle = '#3b82f6';
                list.forEach((s, i) => {
                    ctx.beginPath(); ctx.arc(x(+s.ts), y(totals[i].total), 3, 0, Math.PI * 2); ctx.fill();
                });

                document.getElementById('anLegend').innerHTML =
                    `<span><span class="dot" style="background:#3b82f6"></span>Total</span>` +
                    FLOORS.map(fl => `<span><span class="dot" style="background:${FLOOR_COLORS[fl.id]}"></span>${fl.label}</span>`).join('');
            }

            function renderDowGrid(list, totals) {
                const buckets = Array.from({ length: 7 }, () => Array.from({ length: 24 }, () => ({ sum: 0, n: 0 })));
                list.forEach((s, i) => {
                    const b = buckets[s.ts.getDay()][s.ts.getHours()];
                    b.sum += totals[i].total; b.n++;
                });
                let maxAvg = 0;
                buckets.forEach(row => row.forEach(b => { if (b.n) maxAvg = Math.max(maxAvg, b.sum / b.n); }));
                const days = DAY_NAMES;
                let html = '<div class="dow-grid"><div class="dow-lbl"></div>';
                for (let h = 0; h < 24; h++) html += `<div class="dow-lbl">${h % 3 === 0 ? h : ''}</div>`;
                for (let d = 0; d < 7; d++) {
                    html += `<div class="dow-lbl">${days[d]}</div>`;
                    for (let h = 0; h < 24; h++) {
                        const b = buckets[d][h];
                        if (b.n && maxAvg) {
                            const avg = b.sum / b.n;
                            const [r, g, bl] = ramp(avg / maxAvg);
                            html += `<div class="dow-cell" style="background:rgba(${r},${g},${bl},0.8)" title="${days[d]} ${h}:00 — avg ${avg.toFixed(1)} (${b.n} session${b.n === 1 ? '' : 's'})"></div>`;
                        } else {
                            html += `<div class="dow-cell" title="${days[d]} ${h}:00 — no data"></div>`;
                        }
                    }
                }
                document.getElementById('anGrid').innerHTML = html + '</div>';
            }

            function renderFloorBars(totals) {
                const perFloor = {};
                FLOORS.forEach(fl => perFloor[fl.id] = 0);
                totals.forEach(t => FLOORS.forEach(fl => { perFloor[fl.id] += t.per[fl.id]; }));
                const grand = Object.values(perFloor).reduce((a, b) => a + b, 0);
                document.getElementById('anFloors').innerHTML = FLOORS.map(fl => {
                    const n = perFloor[fl.id];
                    const pct = grand ? n / grand * 100 : 0;
                    return `<div class="floor-row">
                        <span class="fl-name">${fl.label}</span>
                        <div class="fl-bar-wrap"><div class="fl-bar" style="width:${pct.toFixed(1)}%;background:${FLOOR_COLORS[fl.id]}"></div></div>
                        <span class="fl-val">${n.toLocaleString()} (${pct.toFixed(1)}%)</span>
                    </div>`;
                }).join('');
            }

            function exportCSV() {
                const list = analyticsSessions();
                if (!list.length) return;
                const rows = [['submitted_at', 'total', ...FLOORS.map(f => f.id), 'note']];
                list.forEach(s => {
                    const t = sessionTotals(s);
                    rows.push([s.ts.toISOString(), t.total, ...FLOORS.map(f => t.per[f.id]), s.note || '']);
                });
                const csv = rows.map(r => r.map(v => {
                    v = String(v);
                    return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
                }).join(',')).join('\r\n');
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
                a.download = `heatmap-sessions-${list[0].ts.toISOString().slice(0, 10)}_${list[list.length - 1].ts.toISOString().slice(0, 10)}.csv`;
                a.click();
                URL.revokeObjectURL(a.href);
            }

            // ?demo=1 generates synthetic sessions to preview the analytics tools
            if (new URLSearchParams(location.search).get('demo')) {
                const now = Date.now();
                for (let i = 0; i < 60; i++) {
                    const d = new Date(now - Math.floor(Math.random() * 14) * 864e5);
                    d.setHours(8 + Math.floor(Math.random() * 13), Math.random() < 0.5 ? 0 : 30, i, 0);
                    const busy = 0.4 + Math.sin((d.getHours() - 8) / 13 * Math.PI);
                    addSession({
                        submitted_at: d.toISOString(),
                        note: 'demo session',
                        floors: FLOORS.map((fl, fi) => ({
                            id: fl.id,
                            points: Array.from(
                                { length: Math.max(0, Math.round((Math.random() * 14 + 4) * busy / (fi * 0.4 + 1))) },
                                () => ({ x: 150 + Math.random() * 1500, y: 150 + Math.random() * 900, t: +d })
                            )
                        })),
                    });
                }
                loadStatusEl.textContent = 'Demo data (?demo=1) — not real sessions';
                afterSessionsChanged();
            }

            restore();
            fitCanvas();
            redraw();
        })();

        // --- Panel Toggle Logic ---
        const menuBtn = document.getElementById('menuBtn');
        const controlsPanel = document.getElementById('controlsPanel');

        function openPanel() { controlsPanel.removeAttribute('hidden'); menuBtn.setAttribute('aria-expanded', 'true'); }
        function closePanel() { controlsPanel.setAttribute('hidden', ''); menuBtn.setAttribute('aria-expanded', 'false'); }

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const willHide = !controlsPanel.hasAttribute('hidden');
            controlsPanel.toggleAttribute('hidden', willHide);
            menuBtn.setAttribute('aria-expanded', String(!willHide));
        });

        document.addEventListener('click', (e) => {
            if (!controlsPanel.hasAttribute('hidden') &&
                !controlsPanel.contains(e.target) &&
                e.target !== menuBtn) closePanel();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !controlsPanel.hasAttribute('hidden')) closePanel();
        });
    </script>
</body>
</html>
